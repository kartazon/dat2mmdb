name: build-mmdb

on:
  workflow_dispatch:
  schedule:
    - cron: "0 */12 * * *"

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'
          cache: false

      - name: Download geoip.dat
        run: |
          curl -fsSL \
            https://raw.githubusercontent.com/Ground-Zerro/Geo-Aggregator/main/geodat/geoip_GA.dat \
            -o geoip.dat
          echo "geoip.dat size: $(wc -c < geoip.dat) bytes"

      - name: Install v2fly geoip
        run: go install github.com/v2fly/geoip@latest

      - name: Resolve Go dependencies
        run: go mod tidy

      - name: Convert geoip.dat to text
        run: |
          mkdir -p tmp
          cat > config.json << 'JSON'
          {
            "input": [
              {
                "type": "v2rayGeoIPDat",
                "action": "add",
                "args": {
                  "uri": "./geoip.dat"
                }
              }
            ],
            "output": [
              {
                "type": "text",
                "action": "output",
                "args": {
                  "outputDir": "./tmp"
                }
              }
            ]
          }
          JSON
          ~/go/bin/geoip -c config.json

      - name: Build MMDB
        run: |
          mkdir -p output
          echo "Build started: $(date -u +'%Y-%m-%d %H:%M:%S UTC')" > tmp/build.log
          echo "geoip.dat size: $(wc -c < geoip.dat) bytes" >> tmp/build.log
          echo "---" >> tmp/build.log
          go run ./cmd/txt2mmdb \
            -indir  ./tmp \
            -config ./mmdb-config.ini \
            -out    ./output/geoip-country.mmdb \
            2>> tmp/build.log
          echo "---" >> tmp/build.log
          echo "mmdb size: $(wc -c < ./output/geoip-country.mmdb) bytes" >> tmp/build.log
          echo "Build finished: $(date -u +'%Y-%m-%d %H:%M:%S UTC')" >> tmp/build.log
          cat tmp/build.log

      - name: Cleanup tmp txt files
        run: find tmp/ -name "*.txt" -delete

      - name: Commit tmp/build.log to repository
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add tmp/build.log
          git diff --cached --quiet && echo "No changes to commit" || \
            git commit -m "chore: update build.log [$(date -u +'%Y-%m-%d %H:%M UTC')]"
          git push

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: geoip-mmdb
          path: output/*.mmdb

      - name: Generate release tag
        id: tag
        run: echo "name=$(date -u +'%Y%m%d-%H%M')" >> "$GITHUB_OUTPUT"

      - name: Delete existing 'latest' release and tag
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release delete latest --yes --cleanup-tag 2>/dev/null || true

      - name: Create Release and upload mmdb
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create latest \
            --title "geoip-country.mmdb (${{ steps.tag.outputs.name }})" \
            --notes "Auto-generated from [Ground-Zerro/Geo-Aggregator](https://github.com/Ground-Zerro/Geo-Aggregator) geoip_GA.dat on $(date -u +'%Y-%m-%d %H:%M UTC')" \
            --latest \
            output/geoip-country.mmdb
