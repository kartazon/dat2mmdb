name: update-maxmind

on:
  workflow_dispatch:
  schedule:
    - cron: "0 4 */2 * *"   # каждые 2 дня в 04:00 UTC

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write

jobs:
  download:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - edition: GeoLite2-ASN
            folder: geobase/GeoLite_ASN
          - edition: GeoLite2-City
            folder: geobase/GeoLite_City
          - edition: GeoLite2-Country
            folder: geobase/GeoLite_Country

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download ${{ matrix.edition }}
        env:
          MM_ACCOUNT_ID:  ${{ secrets.MAXMIND_ACCOUNT_ID }}
          MM_LICENSE_KEY: ${{ secrets.MAXMIND_LICENSE_KEY }}
        run: |
          set -euo pipefail
          EDITION="${{ matrix.edition }}"
          FOLDER="${{ matrix.folder }}"
          BASE_URL="https://download.maxmind.com/geoip/databases/${EDITION}/download"

          echo "==> Downloading ${EDITION}"

          HTTP_CODE=$(curl -sSL -w "%{http_code}" \
            -u "${MM_ACCOUNT_ID}:${MM_LICENSE_KEY}" \
            "${BASE_URL}?suffix=tar.gz" \
            -o "${EDITION}.tar.gz")
          if [ "${HTTP_CODE}" != "200" ]; then
            echo "ERROR: HTTP ${HTTP_CODE} downloading ${EDITION}.tar.gz"
            cat "${EDITION}.tar.gz"
            exit 1
          fi
          echo "OK: archive downloaded ($(wc -c < ${EDITION}.tar.gz) bytes)"

          # sha256
          HTTP_CODE=$(curl -sSL -w "%{http_code}" \
            -u "${MM_ACCOUNT_ID}:${MM_LICENSE_KEY}" \
            "${BASE_URL}?suffix=tar.gz.sha256" \
            -o "${EDITION}.tar.gz.sha256")
          if [ "${HTTP_CODE}" != "200" ]; then
            echo "ERROR: HTTP ${HTTP_CODE} downloading ${EDITION}.tar.gz.sha256"
            cat "${EDITION}.tar.gz.sha256"
            exit 1
          fi

          # Проверяем sha256
          echo "==> Verifying SHA256"
          EXPECTED=$(awk '{print $1}' "${EDITION}.tar.gz.sha256")
          ACTUAL=$(sha256sum "${EDITION}.tar.gz" | awk '{print $1}')
          if [ "${EXPECTED}" != "${ACTUAL}" ]; then
            echo "ERROR: SHA256 mismatch!"
            echo "  expected: ${EXPECTED}"
            echo "  actual:   ${ACTUAL}"
            exit 1
          fi
          echo "OK: SHA256 verified (${EXPECTED})"

          # Показываем содержимое архива для отладки
          echo "==> Archive contents:"
          tar -tzf "${EDITION}.tar.gz"

          # Находим точный путь к .mmdb внутри архива (без wildcards)
          MMDB_PATH=$(tar -tzf "${EDITION}.tar.gz" | grep "\.mmdb$" | head -1)
          if [ -z "${MMDB_PATH}" ]; then
            echo "ERROR: .mmdb file not found in archive"
            exit 1
          fi
          echo "==> Found: ${MMDB_PATH}"

          # Распаковываем только .mmdb по точному пути
          mkdir -p "${FOLDER}"
          tar -xzf "${EDITION}.tar.gz" \
            --strip-components=1 \
            -C "${FOLDER}" \
            "${MMDB_PATH}"

          cp "${EDITION}.tar.gz.sha256" "${FOLDER}/${EDITION}.mmdb.sha256"

          echo "==> ${EDITION}.mmdb — $(wc -c < ${FOLDER}/${EDITION}.mmdb) bytes"

      - name: Commit updated database
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add "${{ matrix.folder }}/"

          if git diff --cached --quiet; then
            echo "No changes for ${{ matrix.edition }}"
          else
            git commit -m "chore: update ${{ matrix.edition }} [$(date -u +'%Y-%m-%d %H:%M UTC')]"

            # Retry loop на случай race condition при параллельных джобах
            for i in 1 2 3 4 5; do
              echo "==> Push attempt ${i}"
              git pull --rebase origin main && git push && break
              echo "Push failed, retrying in ${i}0s..."
              sleep $((i * 10))
            done
          fi
