# mmdb-config.ini — настройки экспорта тегов в MMDB
#
# Синтаксис:  TAG = PRIORITY
#   PRIORITY > 0  — тег экспортируется; чем больше число, тем выше приоритет.
#                   При конфликте IP-адресов побеждает тег с наибольшим приоритетом.
#   PRIORITY = 0  — тег не экспортируется (то же что отсутствие строки).
#
# REGION — псевдотег: раскрывается во все двухбуквенные ISO-теги из dat.
#   REGION = 1  — экспортировать все страны, каждая под своим ISO-кодом (RU, US, …)
#   REGION = 0  — страны не экспортируются
#   Если REGION не указан — считается REGION = 0.
#
# Если весь файл пуст или все значения = 0 — экспортируются только страны (REGION=1 неявно).
#
# При одинаковом приоритете у двух тегов — побеждает алфавитически первый + предупреждение.
# Тег из конфига, отсутствующий в dat — предупреждение, сборка продолжается.
#
# Регистр тегов нечувствителен. Комментарии начинаются с #.

REGION            = 0
TELEGRAM          = 80
ANTIFILTER-COMMUNITY = 85
RE-FILTER         = 90
RU-WHITELIST      = 100

# Примеры тегов с нулевым приоритетом (не экспортируются):
# CLOUDFLARE  = 0
# CLOUDFRONT  = 0
